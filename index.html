<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#080b12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="音楽アプリ" />
  <title>音楽アプリ</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="brand">
        <div class="logo">♪</div>
        <div>
          <h1>音楽アプリ</h1>
          <p>ファイルから取り込んで再生</p>
        </div>
      </div>

      <button id="importBtn" class="primary">ファイルから取り込む</button>
      <!-- iPhoneでMP3がグレーアウトする問題を避けるため、accept指定を外しています -->
      <input id="filePicker" type="file" multiple hidden />
    </header>

    <section class="now">
      <div class="cover">♪</div>
      <div class="now-info">
        <p class="label">再生中</p>
        <h2 id="nowTitle">まだ選択されていません</h2>
      </div>
      <audio id="player" controls></audio>
    </section>

    <section class="voice-panel" aria-labelledby="voiceTitle">
      <div class="voice-head">
        <div>
          <p class="label">ハンズフリー操作</p>
          <h2 id="voiceTitle">音声運転モード</h2>
        </div>
        <span id="voiceLamp" class="voice-lamp" aria-hidden="true"></span>
      </div>
      <p id="voiceStatus" class="voice-status">停止中</p>
      <p id="voiceTranscript" class="voice-transcript">開始後は「次」「前」「停止」または曲名だけで操作できます</p>
      <div class="voice-actions">
        <button id="voiceStartBtn" class="voice-start">🎤 音声運転モードを開始</button>
        <button id="voiceStopBtn" class="secondary" disabled>停止</button>
      </div>
      <p class="voice-help">対応：「次」「前」「停止」「再生」「シャッフル」または曲名。呼びかけ語は不要です。最初の開始操作は停車中に行ってください。</p>
    </section>

    <section class="toolbar">
      <input id="search" type="search" placeholder="曲を検索" autocomplete="off" />
      <button id="clearBtn" class="secondary">解除</button>
    </section>

    <section id="message" class="message" hidden></section>

    <section>
      <div class="list-head">
        <h2>曲一覧</h2>
        <span id="count">0曲</span>
      </div>
      <div id="songList" class="song-list"></div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
